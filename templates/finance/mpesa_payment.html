{% extends 'base.html' %}
{% load static %}

{% block title %}MPESA Payment | Kabiero Academy{% endblock %}

{% block content %}
<div style="padding: 40px; max-width: 500px; margin: 0 auto;">
    <h2 style="color: #2c3e50; margin-bottom: 30px; text-align: center;">Pay School Fees via MPESA</h2>

    {% if error %}
    <div style="background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" style="background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
        {% csrf_token %}

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: 600; color: #2c3e50; margin-bottom: 8px;">Admission Number</label>
            <input type="text" name="admission" required style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: 600; color: #2c3e50; margin-bottom: 8px;">Phone Number</label>
            <input type="text" name="phone" placeholder="2547XXXXXXXX" required style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: 600; color: #2c3e50; margin-bottom: 8px;">Amount (KES)</label>
            <input type="number" name="amount" required style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box;">
        </div>

        <button type="submit" style="width: 100%; background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.3s;">
            Pay with MPESA
        </button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <a href="{% url 'home' %}" style="color: #667eea; text-decoration: none; font-weight: 500;">← Back to Home</a>
    </div>
</div>
{% endblock %}
